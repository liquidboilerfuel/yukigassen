<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゆきがっせん.io — オンライン雪合戦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --ink:#3d405b;
    --paper:#faf4e4;
    --paper2:#fffaf0;
    --pencil:#89b8d8;
    --accent:#e07a5f;
  }
  body {
    background:#f4ecd8;
    background-image:
      radial-gradient(rgba(61,64,91,.045) 1px, transparent 1.4px),
      radial-gradient(rgba(61,64,91,.03) 1px, transparent 1.4px);
    background-size:26px 26px, 17px 17px;
    background-position:0 0, 9px 13px;
    color:var(--ink);
    font-family:'Yomogi', "Hiragino Kaku Gothic ProN", sans-serif;
    display:flex; flex-direction:column; align-items:center; min-height:100vh;
  }
  h1 {
    font-size:30px; margin:16px 0 2px; letter-spacing:4px;
    transform:rotate(-1.2deg); position:relative;
  }
  h1 .snow { color:var(--pencil); }
  h1::after {
    content:""; position:absolute; left:2%; right:-4%; bottom:-4px; height:7px;
    background:var(--accent); opacity:.55;
    border-radius:60% 40% 55% 45% / 70% 60% 40% 30%;
    transform:rotate(.6deg);
  }
  #subtitle { font-size:13px; opacity:.6; margin-bottom:10px; transform:rotate(-.5deg); }

  #wrap { position:relative; width:min(96vw, 900px); filter:drop-shadow(4px 6px 0 rgba(61,64,91,.14)); }
  canvas {
    width:100%; display:block; cursor:crosshair; touch-action:none;
    background:var(--paper);
    border:3px solid var(--ink);
    border-radius:255px 18px 225px 18px / 18px 225px 18px 255px;
  }

  /* ====== 手書きパーツ共通 ====== */
  .sketchy {
    border:2.5px solid var(--ink);
    border-radius:255px 15px 225px 15px / 15px 225px 15px 255px;
    background:var(--paper2);
    box-shadow:2px 3px 0 rgba(61,64,91,.18);
  }
  .btn {
    padding:9px 24px; cursor:pointer; font-family:'Yomogi';
    font-size:17px; font-weight:bold; color:var(--ink);
    border:2.5px solid var(--ink); background:#fff;
    border-radius:255px 15px 225px 15px / 15px 225px 15px 255px;
    box-shadow:2px 3px 0 rgba(61,64,91,.25);
    transition:transform .1s;
  }
  .btn:hover { transform:rotate(-1.5deg) scale(1.06); background:#fdf1d6; }
  .btn:active { transform:translate(2px,3px); box-shadow:none; }
  .btn.green { background:#dcefdd; }
  .btn.green:hover { background:#c8e6ca; }

  /* ====== ロビー(メモ用紙) ====== */
  #lobby {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  #lobbyCard {
    position:relative; transform:rotate(-1.3deg);
    padding:34px 44px 28px;
    display:flex; flex-direction:column; align-items:center; gap:13px;
    background:var(--paper2);
    border:2.5px solid var(--ink);
    border-radius:255px 25px 225px 25px / 25px 225px 25px 255px;
    box-shadow:3px 5px 0 rgba(61,64,91,.18);
  }
  #lobbyCard::before {           /* マスキングテープ */
    content:""; position:absolute; top:-14px; left:50%;
    width:110px; height:28px; transform:translateX(-50%) rotate(2deg);
    background:rgba(137,184,216,.5);
    border-left:2px dashed rgba(255,255,255,.7);
    border-right:2px dashed rgba(255,255,255,.7);
  }
  #lobbyTitle { font-size:24px; letter-spacing:2px; }
  #lobby input {
    padding:8px 14px; font-size:17px; font-family:'Yomogi';
    color:var(--ink); background:transparent; text-align:center; width:230px;
    border:none; border-bottom:2.5px dashed var(--ink); outline:none;
  }
  #lobby input::placeholder { color:#b4ac97; }
  .row { display:flex; gap:10px; align-items:center; }
  #status { color:var(--accent); font-size:14px; min-height:20px; transform:rotate(-.6deg); }
  .hint { color:#a39a83; font-size:13px; }

  /* ====== HUD ====== */
  #hud {
    display:none; width:min(96vw, 900px); margin:10px 0 8px; gap:10px;
    justify-content:space-between; align-items:flex-start; flex-wrap:wrap;
  }
  #roomBadge {
    padding:7px 14px; font-size:15px;
    display:flex; gap:12px; align-items:center;
    transform:rotate(-1deg);
  }
  #roomBadge b { color:var(--accent); letter-spacing:4px; font-size:21px; cursor:pointer; user-select:none; }
  #copyBtn { padding:3px 12px; font-size:13px; }
  #scores { display:flex; gap:9px; flex-wrap:wrap; }
  .score {
    padding:5px 12px; font-size:14px;
    display:flex; gap:7px; align-items:center;
  }
  .score:nth-child(odd)  { transform:rotate(1.2deg); }
  .score:nth-child(even) { transform:rotate(-1.4deg); }
  .dot {
    width:13px; height:13px; display:inline-block;
    border:1.5px solid var(--ink);
    border-radius:55% 45% 60% 40% / 45% 60% 40% 55%;
  }

  /* ====== トースト ====== */
  #toasts {
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; gap:6px; pointer-events:none; align-items:center;
  }
  .toast {
    padding:4px 16px; font-size:14px;
    background:var(--paper2);
    border:2px solid var(--ink);
    border-radius:255px 12px 225px 12px / 12px 225px 12px 255px;
    box-shadow:2px 2px 0 rgba(61,64,91,.15);
    transform:rotate(-.8deg);
    animation:fade 3s forwards;
  }
  @keyframes fade { 0%{opacity:0; transform:translateY(-6px) rotate(-.8deg)} 10%{opacity:1; transform:translateY(0) rotate(-.8deg)} 80%{opacity:1} 100%{opacity:0} }
  #controls { color:#a39a83; font-size:13px; margin:10px 0 18px; transform:rotate(-.4deg); }
</style>
</head>
<body>
<h1>ゆきがっせん<span class="snow">.io</span> ❄</h1>
<div id="subtitle">〜 らくがき帳のなかで雪合戦 〜</div>

<div id="hud">
  <div id="roomBadge" class="sketchy">部屋コード <b id="codeLabel" title="タップで表示/非表示">----</b>
    <button class="btn" id="copyBtn">招待リンクをコピー</button>
  </div>
  <div id="scores"></div>
</div>

<div id="wrap">
  <canvas id="cv" width="900" height="520"></canvas>
  <div id="toasts"></div>
  <div id="lobby">
    <div id="lobbyCard">
      <div id="lobbyTitle">❄ オンライン雪合戦 ❄</div>
      <input id="nameIn" placeholder="ニックネーム" maxlength="10">
      <button class="btn green" id="createBtn">部屋を作る</button>
      <div class="hint">— または —</div>
      <div class="row">
        <input id="codeIn" placeholder="部屋コード" maxlength="4" style="width:130px">
        <button class="btn" id="joinBtn">参加</button>
      </div>
      <div id="status"></div>
      <div class="hint">サーバー不要のP2P通信で対戦(2〜6人推奨)</div>
    </div>
  </div>
</div>
<div id="controls">PC 移動: WASD / 雪玉: クリック ・ スマホ 移動: 画面左ドラッグ / 雪玉: 右側タップ ・ 動くと巨大化、当たると縮む。ちいさくなりすぎたらやられ!でかい雪玉は3つに分裂!</div>

<script>
'use strict';
// ================== 定数 ==================
const W = 900, H = 520;
const PR = 15;          // プレイヤー半径(初期値)
const GROW = 0.012;     // 移動1pxあたりの成長量(100px移動で半径+1.2px)・上限なし
const BR = 6;           // 雪玉半径(初期値・サイズに比例して拡大)
const SPEED = 230;      // 移動速度 px/s
const BSPEED = 470;     // 雪玉速度
const BRANGE = 540;     // 雪玉の飛距離
const DEATH_R = 8.5;    // これ以下に縮んだら倒される
const SHRINK = 0.5;     // 被弾ダメージ = 弾の半径 × これ × √(自分の半径/PR) ※でかいほど痛い
const SPLIT_R = 9;      // この半径以上の雪玉は着弾時に3方向に分裂
const THROW_COST = 0.13;// 投げると弾の半径×これだけ自分が縮む(雪玉は自分の体から作る)
const COOLDOWN = 420;   // 投擲間隔 ms
const INV_MS = 3000;    // 参加直後の無敵時間 ms(投げたら即終了)
const SENDRATE = 50;    // 状態送信間隔 ms
const PREFIX = 'yukigassen-io-';
const INK = '#3d405b';
const PENCIL = '#89b8d8';
const COLORS = ['#e07a5f','#e8b64c','#81b29a','#6a8ec9','#b0729f','#e78ea5','#ec9f4e','#5fb3a9'];
// 障害物: type 'tree' は木のらくがき、'wall' は雪のかべ
const OBST = [
  {x:150, y:90,  w:50,  h:150, type:'wall'},
  {x:700, y:280, w:50,  h:150, type:'wall'},
  {x:410, y:220, w:80,  h:80,  type:'tree'},
  {x:240, y:390, w:130, h:40,  type:'wall'},
  {x:530, y:90,  w:130, h:40,  type:'wall'},
];

// ================== 状態 ==================
let peer = null, isHost = false, hostConn = null;
const conns = new Map();      // ホスト用: playerId -> DataConnection
const players = new Map();    // リモート: id -> {name,color,x,y,tx,ty,a,hp,score}
let me = null;                // 自分
const balls = new Map();      // bid -> {owner,x,y,vx,vy,dist}
let roomCode = '', playing = false;
let lastThrow = 0, ballSeq = 0;
const keys = new Set();
let mouseX = W/2, mouseY = H/2;

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const $ = id => document.getElementById(id);

// ================== 手書き風描画エンジン ==================
// 「線がプルプル揺れる」ボイリング効果: 一定間隔でシードを進める
let wobbleTick = 0;
setInterval(() => wobbleTick++, 140);

function srand(seed) {
  let t = seed >>> 0;
  return function() {
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ t >>> 15, 1 | t);
    r ^= r + Math.imul(r ^ r >>> 7, 61 | r);
    return ((r ^ r >>> 14) >>> 0) / 4294967296;
  };
}
function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function seedOf(id) { return (hashStr(id) + wobbleTick * 7919) >>> 0; }

// 揺れる円
function wobblyCirclePath(cx, cy, r, seed, mag = 0.09) {
  const rnd = srand(seed);
  const n = Math.max(8, Math.round(r * 0.8));
  const rads = [];
  for (let i = 0; i < n; i++) rads.push(r * (1 + (rnd() - 0.5) * 2 * mag));
  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const a = (i % n) / n * Math.PI * 2;
    const rr = rads[i % n];
    const px = cx + Math.cos(a) * rr, py = cy + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
}
// 揺れる線
function wobblyLine(x1, y1, x2, y2, seed, mag = 1.6) {
  const rnd = srand(seed);
  const len = Math.hypot(x2 - x1, y2 - y1);
  const n = Math.max(2, Math.round(len / 14));
  ctx.beginPath();
  ctx.moveTo(x1 + (rnd()-0.5)*mag, y1 + (rnd()-0.5)*mag);
  for (let i = 1; i <= n; i++) {
    const t = i / n;
    ctx.lineTo(
      x1 + (x2-x1)*t + (i===n ? 0 : (rnd()-0.5)*2*mag),
      y1 + (y2-y1)*t + (i===n ? 0 : (rnd()-0.5)*2*mag)
    );
  }
}
// 揺れる長方形(角丸っぽく手描き)
function wobblyRectPath(x, y, w, h, seed, mag = 2.2) {
  const rnd = srand(seed);
  const pts = [];
  const per = [[x,y,x+w,y],[x+w,y,x+w,y+h],[x+w,y+h,x,y+h],[x,y+h,x,y]];
  per.forEach(([ax,ay,bx,by]) => {
    const len = Math.hypot(bx-ax, by-ay);
    const n = Math.max(2, Math.round(len / 16));
    for (let i = 0; i < n; i++) {
      const t = i / n;
      pts.push([ax + (bx-ax)*t + (rnd()-0.5)*2*mag, ay + (by-ay)*t + (rnd()-0.5)*2*mag]);
    }
  });
  ctx.beginPath();
  pts.forEach(([px,py], i) => i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py));
  ctx.closePath();
}
// スケッチ風ストローク: 2回なぞって鉛筆の重ね描き感
function sketchStroke(pathFn, color = INK, width = 2.2) {
  const base = ctx.globalAlpha;
  ctx.strokeStyle = color;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.globalAlpha = base * 0.9; ctx.lineWidth = width;
  pathFn(0); ctx.stroke();
  ctx.globalAlpha = base * 0.35; ctx.lineWidth = width * 0.8;
  pathFn(31337); ctx.stroke();
  ctx.globalAlpha = base;
}

// ================== ユーティリティ ==================
function genCode() {
  const cs = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i=0;i<4;i++) s += cs[Math.floor(Math.random()*cs.length)];
  return s;
}
function status(t) { $('status').textContent = t; }
function toast(t) {
  const d = document.createElement('div');
  d.className = 'toast'; d.textContent = t;
  $('toasts').appendChild(d);
  setTimeout(() => d.remove(), 3000);
}
function inRect(px, py, r, rc) {
  const cx = Math.max(rc.x, Math.min(px, rc.x+rc.w));
  const cy = Math.max(rc.y, Math.min(py, rc.y+rc.h));
  return (px-cx)**2 + (py-cy)**2 < r*r;
}
function collideObst(px, py, r) { return OBST.some(o => inRect(px,py,r,o)); }
function randomSpawn() {
  for (let i=0;i<50;i++) {
    const x = 40+Math.random()*(W-80), y = 40+Math.random()*(H-80);
    if (!collideObst(x,y,PR+6)) return {x,y};
  }
  return {x:W/2, y:40};
}
function makeMe(id, name) {
  const sp = randomSpawn();
  return { id, name, color: COLORS[Math.floor(Math.random()*COLORS.length)],
           x:sp.x, y:sp.y, a:0, r:PR, dr:PR, score:0 };
}
function snapshot() {
  // invUntilはマシンごとの時計基準なので送らない
  const arr = [{id:me.id,name:me.name,color:me.color,x:me.x,y:me.y,a:me.a,r:me.r,score:me.score}];
  players.forEach(p => arr.push({id:p.id,name:p.name,color:p.color,x:p.x,y:p.y,a:p.a,r:p.r,score:p.score}));
  return arr;
}
function addPlayer(p) {
  if (p.id === me.id || players.has(p.id)) return;
  players.set(p.id, {...p, tx:p.x, ty:p.y, dr:p.r || PR});
}

// ================== 通信 ==================
function emit(msg) {
  if (isHost) relayAll(msg, null);
  else if (hostConn && hostConn.open) hostConn.send(msg);
}
function relayAll(msg, exceptConn) {
  conns.forEach(c => { if (c !== exceptConn && c.open) c.send(msg); });
}

function handle(msg) {
  switch (msg.t) {
    case 'hello': {
      addPlayer(msg.p);
      const np = players.get(msg.p.id);
      if (np) np.invUntil = performance.now() + INV_MS; // 参加直後は無敵
      toast(`${msg.p.name} があそびにきた!`);
      break;
    }
    case 'welcome': {
      msg.players.forEach(p => addPlayer(p));
      startGame();
      break;
    }
    case 'state': {
      const p = players.get(msg.id);
      if (p) { p.tx = msg.x; p.ty = msg.y; p.a = msg.a; p.r = msg.r || PR; }
      break;
    }
    case 'throw': {
      balls.set(msg.bid, {owner:msg.id, x:msg.x, y:msg.y, vx:msg.vx, vy:msg.vy, r:msg.r || BR, dist:0});
      const tp = players.get(msg.id);
      if (tp) tp.invUntil = 0; // 投げたら無敵終了
      break;
    }
    case 'hit': {
      const b = balls.get(msg.bid);
      if (b) { explodeBall(msg.bid, b, 'player'); balls.delete(msg.bid); }
      else { pSnow(msg.x, msg.y, 8, 180, 2.6); }
      const v = players.get(msg.id);
      if (v) v.r = msg.r; // 当たったぶん縮む(drがなめらかに追従)
      break;
    }
    case 'die': {
      const v = players.get(msg.id);
      if (v) {
        deathBurst(v.x, v.y, v.dr || v.r, v.color);
        v.x = v.tx = msg.x; v.y = v.ty = msg.y;
        v.r = PR; v.dr = 2; // ぽんっと生え直す
      }
      const killer = (msg.by === me.id) ? me : players.get(msg.by);
      if (killer) killer.score++;
      const vn = v ? v.name : '?', kn = killer ? killer.name : '?';
      toast(`❄ ${kn} が ${vn} をたおした!`);
      updateScores();
      break;
    }
    case 'leave': {
      const p = players.get(msg.id);
      if (p) toast(`${p.name} がかえっちゃった…`);
      players.delete(msg.id);
      updateScores();
      break;
    }
  }
}

// ---- ホスト側 ----
function createRoom() {
  const name = ($('nameIn').value.trim() || 'プレイヤー').slice(0,10);
  roomCode = genCode();
  status('部屋を作成中…');
  peer = new Peer(PREFIX + roomCode, {debug:1});
  peer.on('open', id => {
    isHost = true;
    me = makeMe(id, name);
    startGame();
  });
  peer.on('connection', conn => {
    conn.on('data', msg => {
      if (msg.t === 'hello') {
        // 1人プレイ(CPU戦)→ 複数人になる瞬間だけスコアをリセット
        if (humanCount() === 0) { deactivateCpu(); me.score = 0; }
        conn.playerId = msg.id;
        conns.set(msg.id, conn);
        handle(msg);
        conn.send({t:'welcome', players:snapshot()});
        relayAll(msg, conn);
        updateScores();
      } else {
        handle(msg);
        relayAll(msg, conn);
      }
    });
    conn.on('close', () => {
      if (conn.playerId && conns.has(conn.playerId)) {
        conns.delete(conn.playerId);
        const m = {t:'leave', id:conn.playerId};
        handle(m);
        relayAll(m, null);
        if (humanCount() === 0) activateCpu(); // また1人になったらCPU復帰
      }
    });
  });
  peer.on('error', e => {
    if (e.type === 'unavailable-id') { peer.destroy(); createRoom(); }
    else status('エラー: ' + e.type);
  });
}

// ---- ゲスト側 ----
function joinRoom() {
  const name = ($('nameIn').value.trim() || 'プレイヤー').slice(0,10);
  const code = $('codeIn').value.trim().toUpperCase();
  if (code.length !== 4) { status('4文字の部屋コードを入力してね'); return; }
  roomCode = code;
  status('接続中…');
  peer = new Peer({debug:1});
  peer.on('open', myId => {
    me = makeMe(myId, name);
    hostConn = peer.connect(PREFIX + code, {reliable:true});
    hostConn.on('open', () => {
      hostConn.send({t:'hello', id:myId, p:{...me}});
    });
    hostConn.on('data', handle);
    hostConn.on('close', () => {
      if (playing) {
        toast('ホストとの接続が切れました');
        playing = false;
        $('lobby').style.display = 'flex';
        status('ホストが退出しました。新しい部屋を作ってね。');
      }
    });
  });
  peer.on('error', e => {
    if (e.type === 'peer-unavailable') status('その部屋が見つかりません');
    else status('エラー: ' + e.type);
  });
}

// ================== ゲーム開始 ==================
function startGame() {
  playing = true;
  me.invUntil = performance.now() + INV_MS; // 参加直後は無敵
  $('lobby').style.display = 'none';
  $('hud').style.display = 'flex';
  renderCode();
  updateScores();
  if (isHost && humanCount() === 0) activateCpu();
  setInterval(() => {
    if (playing) emit({t:'state', id:me.id, x:Math.round(me.x), y:Math.round(me.y), a:+me.a.toFixed(2), r:+me.r.toFixed(1)});
  }, SENDRATE);
}

// 部屋コードの表示/非表示(配信用)
let codeHidden = false;
function renderCode() { $('codeLabel').textContent = codeHidden ? '••••' : roomCode; }
$('codeLabel').onclick = () => { codeHidden = !codeHidden; renderCode(); };

$('copyBtn').onclick = () => {
  const url = location.origin + location.pathname + '?room=' + roomCode;
  navigator.clipboard.writeText(url).then(() => toast('招待リンクをコピーしました!'));
};
$('createBtn').onclick = createRoom;
$('joinBtn').onclick = joinRoom;
$('codeIn').addEventListener('keydown', e => { if (e.key==='Enter') joinRoom(); });

const qRoom = new URLSearchParams(location.search).get('room');
if (qRoom) { $('codeIn').value = qRoom.toUpperCase(); $('nameIn').focus(); }

// ================== 入力 ==================
addEventListener('keydown', e => {
  if (!playing) return;
  keys.add(e.key.toLowerCase());
  if (e.key === ' ') { e.preventDefault(); throwBall(); }
});
addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));
cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top) * (H / r.height);
});
cv.addEventListener('mousedown', () => { if (playing) throwBall(); });

// ---- スマホ: 左半分=バーチャルスティック / 右側タップ=投げる ----
let joyId = null, joyBase = null, joyVec = {x:0, y:0};
const JOY_R = 46;
function tPos(t) {
  const r = cv.getBoundingClientRect();
  return { x:(t.clientX - r.left) * (W / r.width), y:(t.clientY - r.top) * (H / r.height) };
}
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!playing) return;
  for (const t of e.changedTouches) {
    const p = tPos(t);
    if (p.x < W * 0.45 && joyId === null) {
      joyId = t.identifier; joyBase = p; joyVec = {x:0, y:0};
    } else {
      mouseX = p.x; mouseY = p.y;
      me.a = Math.atan2(p.y - me.y, p.x - me.x);
      throwBall();
    }
  }
}, {passive:false});
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joyId) {
      const p = tPos(t);
      let dx = p.x - joyBase.x, dy = p.y - joyBase.y;
      const d = Math.hypot(dx, dy);
      if (d > JOY_R) { dx = dx/d*JOY_R; dy = dy/d*JOY_R; }
      joyVec = {x: dx/JOY_R, y: dy/JOY_R};
    }
  }
}, {passive:false});
function touchEnd(e) {
  for (const t of e.changedTouches) {
    if (t.identifier === joyId) { joyId = null; joyVec = {x:0, y:0}; }
  }
}
cv.addEventListener('touchend', touchEnd);
cv.addEventListener('touchcancel', touchEnd);

function throwBall() {
  const now = performance.now();
  if (now - lastThrow < COOLDOWN) return;
  lastThrow = now;
  me.invUntil = 0; // 投げたら無敵終了
  const bid = me.id + '-' + (ballSeq++);
  const ballR = BR * me.r / PR; // 自分のサイズに比例して弾もでかい
  const vx = Math.cos(me.a) * BSPEED, vy = Math.sin(me.a) * BSPEED;
  const bx = me.x + Math.cos(me.a) * (me.r + ballR + 2);
  const by = me.y + Math.sin(me.a) * (me.r + ballR + 2);
  balls.set(bid, {owner:me.id, x:bx, y:by, vx, vy, r:ballR, dist:0});
  // 雪玉は自分の体から削って作る(ただし投げ死にはしない)
  me.r = Math.max(DEATH_R + 0.7, me.r - ballR * THROW_COST);
  pSnow(bx, by, 4, 70, 1.6); // 投げた瞬間の雪煙
  emit({t:'throw', id:me.id, bid, x:Math.round(bx), y:Math.round(by), vx:Math.round(vx), vy:Math.round(vy), r:+ballR.toFixed(1)});
}

// ================== パーティクル & 演出 ==================
const parts = [];          // 飛び散る雪・リング
const pendingBalls = [];   // 分裂で生まれる子弾(反復中のMap変更を避ける)
let shake = 0;             // 画面揺れ
function addShake(m) { shake = Math.min(14, shake + m); }
function pSnow(x, y, n, spd, size, color) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = spd * (0.3 + Math.random() * 0.7);
    parts.push({type:'dot', x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v - spd*0.15,
                life:0, max:0.45 + Math.random()*0.45, s:size*(0.5 + Math.random()), c:color || '#ffffff'});
  }
  if (parts.length > 350) parts.splice(0, parts.length - 350);
}
function pRing(x, y, r, color) {
  parts.push({type:'ring', x, y, r0:r, life:0, max:0.45, c:color || PENCIL});
}
// 死亡演出: 体の雪+帽子のかけらが飛び散る
function deathBurst(x, y, r, color) {
  pSnow(x, y, Math.round(10 + r), 240, 4);
  pSnow(x, y - r, 7, 170, 3.2, color);
  pRing(x, y, r * 0.7);
  pRing(x, y, r * 0.3, color);
}
// 着弾処理: 雪の飛沫+大きい弾は3方向に分裂
function explodeBall(bid, b, cause) {
  pSnow(b.x, b.y, Math.round(4 + b.r), 90 + b.r * 12, 2.2 + b.r * 0.18);
  if (b.r >= SPLIT_R) {
    pRing(b.x, b.y, b.r);
    addShake(Math.min(6, b.r * 0.25));
    let base = Math.atan2(b.vy, b.vx);
    if (cause === 'solid') base += Math.PI; // 壁・障害物なら跳ね返る向きに散る
    [-0.75, 0, 0.75].forEach((off, i) => {
      const a = base + off;
      pendingBalls.push([bid + '~' + i, {
        owner: b.owner, x: b.x, y: b.y,
        vx: Math.cos(a) * BSPEED * 0.7, vy: Math.sin(a) * BSPEED * 0.7,
        r: b.r * 0.5, dist: BRANGE - 175, grace: 40 // 生まれた直後は当たらない
      }]);
    });
  }
}

// ================== 最強CPU(1人のとき専用・ローカル動作) ==================
const CPU_ID = 'cpu';
const CPU_COOLDOWN = COOLDOWN; // 連射速度もプレイヤーと同じ(身体能力は互角)
let cpuActive = false, cpuCd = 0, cpuSeq = 0;
let strafeDir = 1, strafeTimer = 0;
let cpuStuckT = 0, cpuRampageT = 0, cpuJerkT = 0, cpuJerk = null; // スタック時の暴れモード用
let meVX = 0, meVY = 0;

function humanCount() { return players.size - (players.has(CPU_ID) ? 1 : 0); }

function activateCpu() {
  if (cpuActive || !playing) return;
  const sp = randomSpawn();
  players.set(CPU_ID, {id:CPU_ID, cpu:true, name:'CPU', color:COLORS[Math.floor(Math.random()*COLORS.length)],
                       x:sp.x, y:sp.y, tx:sp.x, ty:sp.y, a:0, r:PR, dr:PR, score:0,
                       invUntil: performance.now() + INV_MS});
  me.score = 0;
  cpuActive = true; cpuCd = 1000;
  toast('CPU があそびにきた!');
  updateScores();
}
function deactivateCpu() {
  if (!cpuActive) return;
  players.delete(CPU_ID);
  [...balls.keys()].forEach(bid => { if (balls.get(bid).owner === CPU_ID) balls.delete(bid); });
  cpuActive = false;
  updateScores();
}
// 偏差撃ち: 相手の移動を先読みして命中する時刻を解く
function leadSolve(dx, dy, vx, vy, s) {
  const a = vx*vx + vy*vy - s*s;
  const b = 2 * (dx*vx + dy*vy);
  const c = dx*dx + dy*dy;
  if (Math.abs(a) < 1e-6) return b !== 0 && -c/b > 0 ? -c/b : null;
  const disc = b*b - 4*a*c;
  if (disc < 0) return null;
  const r = Math.sqrt(disc);
  const t1 = (-b - r) / (2*a), t2 = (-b + r) / (2*a);
  if (t1 > 0 && t2 > 0) return Math.min(t1, t2);
  if (t1 > 0) return t1;
  if (t2 > 0) return t2;
  return null;
}
// 射線が障害物で通っているか
function losClear(x1, y1, x2, y2) {
  const len = Math.hypot(x2-x1, y2-y1);
  const n = Math.max(2, Math.ceil(len / 12));
  for (let i = 1; i < n; i++) {
    const t = i / n;
    if (collideObst(x1+(x2-x1)*t, y1+(y2-y1)*t, BR)) return false;
  }
  return true;
}
function updateCpu(dt) {
  const bot = players.get(CPU_ID);
  if (!bot) return;

  // 1) 飛んでくる雪玉を予測してかわす
  let mvx = 0, mvy = 0, dodging = false;
  balls.forEach(b => {
    if (b.owner === CPU_ID) return;
    const bv = Math.hypot(b.vx, b.vy);
    if (!bv) return;
    const t = ((bot.x-b.x)*b.vx + (bot.y-b.y)*b.vy) / (bv*bv);
    if (t > 0 && t < 0.7) {
      const cx = b.x + b.vx*t, cy = b.y + b.vy*t;
      if (Math.hypot(bot.x-cx, bot.y-cy) < bot.r + b.r + 27) {
        const px = -b.vy/bv, py = b.vx/bv;
        const side = ((bot.x-b.x)*px + (bot.y-b.y)*py) >= 0 ? 1 : -1;
        mvx += px*side; mvy += py*side; dodging = true;
      }
    }
  });
  // 回避ベクトルが打ち消し合ってほぼゼロなら、通常移動にフォールバック
  if (dodging && Math.hypot(mvx, mvy) < 0.3) { dodging = false; mvx = 0; mvy = 0; }
  // 2) かわす必要がなければ距離を保って回り込む
  if (!dodging) {
    const dx = me.x-bot.x, dy = me.y-bot.y, d = Math.hypot(dx, dy) || 1;
    strafeTimer -= dt;
    if (strafeTimer <= 0) { strafeTimer = 0.8 + Math.random()*1.2; if (Math.random() < 0.5) strafeDir *= -1; }
    let ax = 0, ay = 0;
    if (d > 300) { ax += dx/d; ay += dy/d; }
    else if (d < 170) { ax -= dx/d; ay -= dy/d; }
    ax += -dy/d * strafeDir * 0.9;
    ay +=  dx/d * strafeDir * 0.9;
    const al = Math.hypot(ax, ay) || 1;
    mvx = ax/al; mvy = ay/al;
  }
  // 暴れモード中: ランダム方向へ全力ダッシュを高速で繰り返す
  if (cpuRampageT > 0) {
    cpuRampageT -= dt; cpuJerkT -= dt;
    if (cpuJerkT <= 0 || !cpuJerk) {
      // 中央方向に少しだけ寄せた、ほぼ全方位のランダムダッシュ
      const ca = Math.atan2(H/2 - bot.y, W/2 - bot.x) + (Math.random() - 0.5) * 3.0;
      cpuJerk = {x: Math.cos(ca), y: Math.sin(ca)};
      cpuJerkT = 0.1 + Math.random() * 0.2;
    }
    mvx = cpuJerk.x; mvy = cpuJerk.y;
  }
  const nl = Math.hypot(mvx, mvy);
  if (nl) {
    const obx = bot.x, oby = bot.y;
    mvx /= nl; mvy /= nl;
    let nx = bot.x + mvx * SPEED * dt;
    let ny = bot.y + mvy * SPEED * dt;
    nx = Math.max(bot.r, Math.min(W-bot.r, nx));
    ny = Math.max(bot.r, Math.min(H-bot.r, ny));
    if (!collideObst(nx, bot.y, bot.r)) bot.x = nx;
    if (!collideObst(bot.x, ny, bot.r)) bot.y = ny;
    bot.tx = bot.x; bot.ty = bot.y;
    // CPUも動いたぶんだけ無制限に巨大化(同じルール)
    const moved = Math.hypot(bot.x - obx, bot.y - oby);
    bot.r += moved * GROW;
    // スタック検知: 動こうとしているのにほぼ進めていない
    if (moved < SPEED * dt * 0.3) {
      cpuStuckT += dt;
      if (cpuRampageT > 0) cpuJerkT = 0; // 暴れ中に詰まったら即方向転換
    } else {
      cpuStuckT = Math.max(0, cpuStuckT - dt * 2);
    }
    if (cpuStuckT > 0.2) {
      cpuStuckT = 0;
      strafeDir *= -1; // 回り込み方向も反転
      cpuRampageT = 0.9 + Math.random() * 0.6; // 暴れモード発動!
      cpuJerkT = 0;
    }
  } else {
    // 移動ベクトルがゼロでもスタック扱いにする(棒立ち防止)
    cpuStuckT += dt;
    if (cpuStuckT > 0.2) {
      cpuStuckT = 0;
      strafeDir *= -1;
      cpuRampageT = 0.9 + Math.random() * 0.6;
      cpuJerkT = 0;
    }
  }
  // 3) 完璧な偏差撃ち
  const sol = leadSolve(me.x-bot.x, me.y-bot.y, meVX, meVY, BSPEED);
  const tx = sol !== null ? me.x + meVX*sol : me.x;
  const ty = sol !== null ? me.y + meVY*sol : me.y;
  bot.a = Math.atan2(ty-bot.y, tx-bot.x);
  cpuCd -= dt*1000;
  if (cpuCd <= 0 && losClear(bot.x, bot.y, tx, ty)) {
    cpuCd = CPU_COOLDOWN;
    bot.invUntil = 0; // 投げたら無敵終了
    const bid = CPU_ID + '-' + (cpuSeq++);
    const ballR = BR * bot.r / PR;
    const bx = bot.x + Math.cos(bot.a)*(bot.r+ballR+2), by = bot.y + Math.sin(bot.a)*(bot.r+ballR+2);
    balls.set(bid, {owner:CPU_ID, x:bx, y:by, vx:Math.cos(bot.a)*BSPEED, vy:Math.sin(bot.a)*BSPEED, r:ballR, dist:0});
    bot.r = Math.max(DEATH_R + 0.7, bot.r - ballR * THROW_COST); // CPUも体から雪を削る
    pSnow(bx, by, 4, 70, 1.6);
  }
  // 4) 自分の雪玉がCPUに当たったか
  balls.forEach((b, bid) => {
    if (b.owner === CPU_ID) return;
    if (performance.now() < (bot.invUntil || 0)) return; // 無敵中
    if ((b.grace || 0) <= 0 && (b.x-bot.x)**2 + (b.y-bot.y)**2 < (bot.r+b.r)**2) {
      explodeBall(bid, b, 'player');
      balls.delete(bid);
      bot.r -= b.r * SHRINK * Math.sqrt(bot.r / PR); // CPUもでかいほど大きく削れる
      if (bot.r <= DEATH_R) {
        deathBurst(bot.x, bot.y, bot.dr || bot.r, bot.color);
        addShake(7);
        const sp = randomSpawn();
        bot.x = bot.tx = sp.x; bot.y = bot.ty = sp.y; bot.r = PR; bot.dr = 2;
        me.score++;
        toast('❄ CPU をたおした!');
        updateScores();
      }
    }
  });
}

// ================== 更新 ==================
let lastT = performance.now();
function update(now) {
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;

  // ゆっくり降る雪
  snowDots.forEach(d => {
    d.y += d.v * dt; d.x += Math.sin(now/1400 + d.p) * 6 * dt;
    if (d.y > H) { d.y = -4; d.x = Math.random()*W; }
  });

  if (!playing) return;
  const pmx = me.x, pmy = me.y;

  let mvx = 0, mvy = 0;
  let dx = 0, dy = 0;
  if (keys.has('w') || keys.has('arrowup')) dy--;
  if (keys.has('s') || keys.has('arrowdown')) dy++;
  if (keys.has('a') || keys.has('arrowleft')) dx--;
  if (keys.has('d') || keys.has('arrowright')) dx++;
  if (dx || dy) {
    const len = Math.hypot(dx, dy);
    mvx = dx/len; mvy = dy/len;
  }
  if (joyId !== null && (joyVec.x || joyVec.y)) { mvx = joyVec.x; mvy = joyVec.y; }
  if (mvx || mvy) {
    let nx = me.x + mvx * SPEED * dt;
    let ny = me.y + mvy * SPEED * dt;
    nx = Math.max(me.r, Math.min(W-me.r, nx));
    ny = Math.max(me.r, Math.min(H-me.r, ny));
    if (!collideObst(nx, me.y, me.r)) me.x = nx;
    if (!collideObst(me.x, ny, me.r)) me.y = ny;
  }
  me.a = Math.atan2(mouseY - me.y, mouseX - me.x);
  if (dt > 0.001) { meVX = (me.x - pmx) / dt; meVY = (me.y - pmy) / dt; }
  // 動くほど無制限に巨大化(でかい=当たりやすいが、弾もでかくなる)
  me.r += Math.hypot(me.x - pmx, me.y - pmy) * GROW;
  if (cpuActive) updateCpu(dt);

  me.dr += (me.r - me.dr) * 0.2; // 表示サイズはなめらかに追従
  players.forEach(p => {
    if (p.dr === undefined) p.dr = p.r;
    p.dr += (p.r - p.dr) * 0.2;
    if (p.cpu) return; // CPUはローカル制御なので補間しない
    p.x += (p.tx - p.x) * 0.35;
    p.y += (p.ty - p.y) * 0.35;
  });

  const dead = [];
  balls.forEach((b, bid) => {
    const step = Math.hypot(b.vx, b.vy) * dt;
    b.x += b.vx * dt; b.y += b.vy * dt; b.dist += step;
    if (b.grace > 0) b.grace -= step;
    if (b.dist > BRANGE) { explodeBall(bid, b, 'range'); dead.push(bid); return; }
    if (b.x < 0 || b.x > W || b.y < 0 || b.y > H || collideObst(b.x, b.y, b.r)) {
      explodeBall(bid, b, 'solid'); dead.push(bid); return;
    }
    if (b.owner !== me.id && (b.grace || 0) <= 0 && now >= (me.invUntil || 0) && (b.x-me.x)**2 + (b.y-me.y)**2 < (me.r+b.r)**2) {
      explodeBall(bid, b, 'player');
      dead.push(bid);
      me.r -= b.r * SHRINK * Math.sqrt(me.r / PR); // でかいほど大きく削れる
      addShake(4 + b.r * 0.4);
      if (me.r > DEATH_R) {
        emit({t:'hit', id:me.id, bid, r:+me.r.toFixed(1), x:Math.round(b.x), y:Math.round(b.y)});
      } else {
        deathBurst(me.x, me.y, me.dr, me.color);
        addShake(12);
        const sp = randomSpawn();
        me.x = sp.x; me.y = sp.y; me.r = PR; me.dr = 2; // リスポーンで元のサイズに
        emit({t:'die', id:me.id, by:b.owner, x:Math.round(sp.x), y:Math.round(sp.y)});
        const killer = players.get(b.owner);
        if (killer) killer.score++;
        toast(`❄ ${killer ? killer.name : '?'} にやられた!`);
        updateScores();
      }
    }
  });
  dead.forEach(bid => balls.delete(bid));
  // 分裂で生まれた子弾を反映
  if (pendingBalls.length) {
    pendingBalls.forEach(([bid, b]) => balls.set(bid, b));
    pendingBalls.length = 0;
  }
  // パーティクル更新
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.life += dt;
    if (p.type === 'dot') {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vx *= (1 - 3*dt); p.vy *= (1 - 3*dt);
      p.vy += 60 * dt; // ふわっと落ちる
    }
    if (p.life >= p.max) parts.splice(i, 1);
  }
}

// ================== 描画 ==================
// 降る雪(鉛筆の点々)
const snowDots = Array.from({length:60}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.5+0.6, v: 8+Math.random()*14, p: Math.random()*7
}));
// 地面の斜線ハッチング(固定らくがき)
const hatches = Array.from({length:26}, (_, i) => ({
  x: (i*137 + 60) % (W-80) + 30, y: (i*211 + 90) % (H-60) + 20, len: 14+((i*53)%18)
}));

function draw() {
  ctx.clearRect(0, 0, W, H);
  // 画面揺れ
  ctx.save();
  if (shake > 0.1) {
    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    shake *= 0.86;
  } else shake = 0;

  // うっすら地面のハッチング
  ctx.globalAlpha = 0.16;
  hatches.forEach((hh, i) => {
    sketchStroke(s => wobblyLine(hh.x, hh.y, hh.x+hh.len, hh.y-5, seedOf('h'+i)+s, 1), PENCIL, 1.6);
  });
  ctx.globalAlpha = 1;

  // 雪の結晶らくがき(降る)
  snowDots.forEach((d, i) => {
    if (d.r > 1.6) {
      // 大きい粒はアスタリスク型の結晶
      ctx.globalAlpha = 0.4;
      const rr = d.r * 2.4;
      for (let k = 0; k < 3; k++) {
        const a = k * Math.PI / 3 + (i % 5) * 0.2;
        sketchStroke(s => wobblyLine(d.x-Math.cos(a)*rr, d.y-Math.sin(a)*rr, d.x+Math.cos(a)*rr, d.y+Math.sin(a)*rr, seedOf('sf'+i)+s, 0.7), PENCIL, 1.1);
      }
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = 'rgba(137,184,216,.35)';
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, 7); ctx.fill();
    }
  });

  // 障害物
  OBST.forEach((o, i) => o.type === 'tree' ? drawTree(o, i) : drawWall(o, i));

  // 雪玉
  balls.forEach((b, bid) => {
    // 動きのらくがき線(残像)
    ctx.globalAlpha = 0.3;
    sketchStroke(s => wobblyLine(b.x - b.vx*0.045, b.y - b.vy*0.045, b.x - b.vx*0.012, b.y - b.vy*0.012, seedOf(bid)+s, 1), PENCIL, 1.6);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ffffff';
    wobblyCirclePath(b.x, b.y, b.r, seedOf(bid), 0.16);
    ctx.fill();
    sketchStroke(s => wobblyCirclePath(b.x, b.y, b.r, seedOf(bid)+s, 0.16), INK, 1.6);
  });

  // プレイヤー(ゆきだるま)
  players.forEach(p => drawSnowman(p, false));
  if (playing && me) drawSnowman(me, true);

  // パーティクル(雪の飛沫・リング)
  parts.forEach(p => {
    const t = p.life / p.max;
    if (p.type === 'dot') {
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = p.c;
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.4, p.s * (1 - t*0.5)), 0, 7); ctx.fill();
      if (p.s > 2.6) {
        ctx.globalAlpha = (1 - t) * 0.5;
        ctx.strokeStyle = INK; ctx.lineWidth = 1;
        ctx.stroke();
      }
    } else { // 手描き風の広がるリング
      ctx.globalAlpha = (1 - t) * 0.8;
      ctx.strokeStyle = p.c; ctx.lineWidth = 2.2;
      wobblyCirclePath(p.x, p.y, p.r0 + 46 * t, seedOf('ring'), 0.08);
      ctx.stroke();
    }
  });
  ctx.globalAlpha = 1;

  // バーチャルスティック(手描き風)
  if (joyId !== null && joyBase) {
    ctx.globalAlpha = 0.35;
    sketchStroke(s => wobblyCirclePath(joyBase.x, joyBase.y, JOY_R, seedOf('joy')+s, 0.06), INK, 2);
    ctx.globalAlpha = 0.75;
    ctx.fillStyle = '#ffffff';
    wobblyCirclePath(joyBase.x + joyVec.x*JOY_R, joyBase.y + joyVec.y*JOY_R, 17, seedOf('knob'), 0.1);
    ctx.fill();
    sketchStroke(s => wobblyCirclePath(joyBase.x + joyVec.x*JOY_R, joyBase.y + joyVec.y*JOY_R, 17, seedOf('knob')+s, 0.1), INK, 2.2);
    ctx.globalAlpha = 1;
  }
  ctx.restore(); // 画面揺れ解除

  requestAnimationFrame(t => { update(t); draw(); });
}

// 雪のかべ
function drawWall(o, i) {
  ctx.fillStyle = '#ffffff';
  wobblyRectPath(o.x, o.y, o.w, o.h, seedOf('w'+i), 2.4);
  ctx.fill();
  sketchStroke(s => wobblyRectPath(o.x, o.y, o.w, o.h, seedOf('w'+i)+s, 2.4), INK, 2.4);
  // 雪ブロックのつなぎ目
  ctx.globalAlpha = 0.5;
  if (o.w > o.h) {
    for (let k = 1; k < 3; k++) {
      const gx = o.x + o.w*k/3;
      sketchStroke(s => wobblyLine(gx, o.y+4, gx, o.y+o.h-4, seedOf('wg'+i+k)+s, 1.4), PENCIL, 1.6);
    }
  } else {
    for (let k = 1; k < 4; k++) {
      const gy = o.y + o.h*k/4;
      sketchStroke(s => wobblyLine(o.x+4, gy, o.x+o.w-4, gy, seedOf('wg'+i+k)+s, 1.4), PENCIL, 1.6);
    }
  }
  ctx.globalAlpha = 1;
}

// もみの木のらくがき
function drawTree(o, i) {
  const cx = o.x + o.w/2, base = o.y + o.h, top = o.y - 14;
  // 幹
  ctx.fillStyle = '#c8a173';
  wobblyRectPath(cx-7, base-16, 14, 16, seedOf('tt'+i), 1.4);
  ctx.fill();
  sketchStroke(s => wobblyRectPath(cx-7, base-16, 14, 16, seedOf('tt'+i)+s, 1.4), INK, 2);
  // 3段の三角
  const layers = [
    {y: base-12, w: o.w*0.62, h: 34},
    {y: base-38, w: o.w*0.5,  h: 32},
    {y: base-62, w: o.w*0.38, h: 30},
  ];
  layers.forEach((L, k) => {
    const tri = s => {
      const rnd = srand(seedOf('tl'+i+k)+s);
      ctx.beginPath();
      const pts = [[cx-L.w, L.y],[cx+L.w, L.y],[cx, L.y-L.h]];
      const path = [];
      for (let e = 0; e < 3; e++) {
        const [ax,ay] = pts[e], [bx,by] = pts[(e+1)%3];
        const n = 4;
        for (let t = 0; t < n; t++)
          path.push([ax+(bx-ax)*t/n + (rnd()-0.5)*3.2, ay+(by-ay)*t/n + (rnd()-0.5)*3.2]);
      }
      path.forEach(([px,py], q) => q===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py));
      ctx.closePath();
    };
    ctx.fillStyle = '#8fbf9f';
    tri(0); ctx.fill();
    sketchStroke(tri, '#4f7d5e', 2.2);
  });
  // てっぺんの雪
  ctx.fillStyle = '#ffffff';
  wobblyCirclePath(cx, base - 92, 7, seedOf('ts'+i), 0.2);
  ctx.fill();
  sketchStroke(s => wobblyCirclePath(cx, base - 92, 7, seedOf('ts'+i)+s, 0.2), INK, 1.6);
}

// ゆきだるまプレイヤー
function drawSnowman(p, self) {
  const seed = seedOf(p.id);
  const rr = p.dr || p.r || PR;   // 表示半径(縮み・生え直しがなめらか)
  const k = rr / PR;              // 顔パーツの拡大率
  const inv = (p.invUntil || 0) > performance.now(); // 無敵中はふわふわ点滅
  const bodyAlpha = inv ? 0.55 + 0.25 * Math.sin(performance.now() / 90) : 1;
  // 影(鉛筆ぐるぐる)
  ctx.globalAlpha = 0.14;
  ctx.fillStyle = INK;
  wobblyCirclePath(p.x + 3, p.y + rr*0.55, rr*0.9, seed+5, 0.15);
  ctx.fill();
  ctx.globalAlpha = bodyAlpha;

  // 体(白い雪だるま)
  ctx.fillStyle = '#ffffff';
  wobblyCirclePath(p.x, p.y, rr, seed, 0.07);
  ctx.fill();
  sketchStroke(s => wobblyCirclePath(p.x, p.y, rr, seed+s, 0.07), INK, self ? 2.8 : 2.2);

  // 腕(投げる方向へ)+ ミトン
  const hx = p.x + Math.cos(p.a)*(rr+7*k), hy = p.y + Math.sin(p.a)*(rr+7*k);
  sketchStroke(s => wobblyLine(p.x + Math.cos(p.a)*rr*0.4, p.y + Math.sin(p.a)*rr*0.4, hx, hy, seed+9+s, 1), INK, 2.4);
  ctx.fillStyle = p.color;
  wobblyCirclePath(hx, hy, 4.5*k, seed+13, 0.2);
  ctx.fill();
  sketchStroke(s => wobblyCirclePath(hx, hy, 4.5*k, seed+13+s, 0.2), INK, 1.5);

  // ニット帽(プレイヤーカラー)
  ctx.fillStyle = p.color;
  const hat = s => {
    const rnd = srand(seed+21+s);
    ctx.beginPath();
    ctx.moveTo(p.x - rr*0.85 + (rnd()-0.5)*2, p.y - rr*0.45 + (rnd()-0.5)*2);
    ctx.quadraticCurveTo(p.x + (rnd()-0.5)*3, p.y - rr*1.75, p.x + rr*0.85 + (rnd()-0.5)*2, p.y - rr*0.45 + (rnd()-0.5)*2);
    ctx.closePath();
  };
  hat(0); ctx.fill();
  sketchStroke(hat, INK, 2);
  // ぼんぼん
  ctx.fillStyle = '#ffffff';
  wobblyCirclePath(p.x, p.y - rr*1.35, 4*k, seed+27, 0.25);
  ctx.fill();
  sketchStroke(s => wobblyCirclePath(p.x, p.y - rr*1.35, 4*k, seed+27+s, 0.25), INK, 1.5);

  // 目(向いてる方に寄る)
  const ex = Math.cos(p.a)*3.5*k, ey = Math.sin(p.a)*3.5*k + 1;
  ctx.fillStyle = INK;
  ctx.beginPath(); ctx.arc(p.x-4.5*k+ex, p.y-1+ey, 1.8*k, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(p.x+4.5*k+ex, p.y-1+ey, 1.8*k, 0, 7); ctx.fill();
  // にんじんの鼻
  ctx.strokeStyle = '#e07a5f'; ctx.lineWidth = 3*k; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(p.x+ex, p.y+2+ey);
  ctx.lineTo(p.x+ex+Math.cos(p.a)*6*k, p.y+2+ey+Math.sin(p.a)*6*k);
  ctx.stroke();

  // 名前(体力=サイズなのでハート表示は廃止)
  ctx.fillStyle = INK; ctx.font = "14px 'Yomogi', sans-serif"; ctx.textAlign = 'center';
  ctx.fillText(p.name, p.x, p.y - rr - 8);
  // 無敵バリア(点線サークル)
  if (inv) {
    ctx.globalAlpha = 0.8;
    ctx.setLineDash([7, 6]);
    ctx.strokeStyle = PENCIL; ctx.lineWidth = 2;
    wobblyCirclePath(p.x, p.y, rr + 9, seed + 41, 0.05);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.globalAlpha = 1;
}

// ================== スコアボード ==================
function updateScores() {
  const all = playing ? snapshot() : [];
  all.sort((a, b) => b.score - a.score);
  $('scores').innerHTML = all.map((p, i) =>
    `<span class="score sketchy">${i===0 && p.score>0 ? '👑 ' : ''}<span class="dot" style="background:${p.color}"></span>${escapeHtml(p.name)}: <b>${p.score}</b></span>`
  ).join('');
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
setInterval(updateScores, 2000);

draw();
</script>
